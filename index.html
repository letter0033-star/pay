<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>호봉획정 Pro V3.8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

        :root {
            --primary: #1e40af;
            --border: #000000;
        }

        body {
            font-family: 'Noto Sans KR', 'Inter', sans-serif;
            background-color: #f1f5f9;
            color: #1e293b;
        }

        .sidebar {
            background: #ffffff;
            border-right: 1px solid #e2e8f0;
        }

        .paper {
            background: white;
            width: 210mm;
            min-height: 297mm;
            padding: 15mm 15mm;
            margin: 0 auto;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            position: relative;
            color: #000;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1rem;
            table-layout: fixed;
        }

        th, td {
            border: 1px solid var(--border);
            padding: 6px 4px;
            text-align: center;
            line-height: 1.4;
            word-break: break-all;
        }

        .info-table {
            font-size: 12px;
        }
        .info-table th {
            background-color: #f8fafc;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.1em;
        }
        .info-table .label {
            background-color: #f1f5f9;
            font-weight: 600;
            width: 15%;
        }
        .highlight-blue { color: #1e40af; font-weight: 800; font-size: 18px; }
        .highlight-red { color: #dc2626; font-weight: 800; font-size: 16px; }

        .career-table {
            font-size: 10px; 
        }
        .career-table th { padding: 4px 2px; background-color: #f8fafc; }

        input[type="text"], input[type="date"], input[type="number"], select {
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 13px;
            width: 100%;
            transition: all 0.2s;
        }

        .career-row-input {
            border: none !important;
            background: transparent !important;
            padding: 0 !important;
            text-align: center;
            font-size: 9px;
            width: 100%;
            height: 100%;
            display: block;
            appearance: none;
            -webkit-appearance: none;
        }

        @media print {
            body { background: white; padding: 0; }
            .no-print { display: none !important; }
            .paper { 
                box-shadow: none; 
                margin: 0; 
                width: 100%; 
                padding: 10mm;
            }
            .col-note { width: 10% !important; }
            .col-delete { display: none !important; }
            
            input[type="date"]::-webkit-inner-spin-button,
            input[type="date"]::-webkit-calendar-picker-indicator {
                display: none;
                -webkit-appearance: none;
            }
            
            @page { size: A4; margin: 0; }
        }
    </style>
</head>
<body>

<div class="flex min-h-screen">
    <!-- Sidebar -->
    <aside class="w-80 sidebar no-print p-5 h-screen overflow-y-auto sticky top-0">
        <div class="flex items-center gap-2 mb-6">
            <div class="bg-blue-700 p-2 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
            </div>
            <h1 class="text-lg font-bold text-slate-800">호봉획정 Pro V3.8</h1>
        </div>

        <div class="space-y-5">
            <section class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                <h3 class="text-xs font-bold text-blue-800 uppercase mb-3">문서 공통 설정</h3>
                <div class="space-y-3">
                    <div>
                        <label class="text-[11px] font-bold text-slate-500 mb-1 block">소속 교육청명</label>
                        <input type="text" id="in-office-text" value="강원특별자치도교육청" oninput="update()">
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-slate-500 mb-1 block">문서명</label>
                        <input type="text" id="in-header-text" value="기간제교원" oninput="update()">
                    </div>
                </div>
            </section>

            <section class="space-y-3">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-tight">대상자 정보</h3>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-[11px] font-semibold text-slate-600 mb-1 block">소속 (기관명)</label>
                        <input type="text" id="in-dept" value="00초등학교" oninput="update()">
                    </div>
                    <div>
                        <label class="text-[11px] font-semibold text-slate-600 mb-1 block">성명</label>
                        <input type="text" id="in-name" value="홍길동" oninput="update()">
                    </div>
                </div>
                <div>
                    <label class="text-[11px] font-semibold text-slate-600 mb-1 block">획정 기준일</label>
                    <input type="date" id="in-date" onchange="update()">
                </div>
            </section>

            <section class="space-y-3 p-4 bg-slate-50 rounded-xl border border-slate-200">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-tight">확인자 설정</h3>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-[11px] font-semibold text-slate-600 mb-1 block">직위</label>
                        <input type="text" id="in-verifier-rank" value="교 감" oninput="update()">
                    </div>
                    <div>
                        <label class="text-[11px] font-semibold text-slate-600 mb-1 block">성명</label>
                        <input type="text" id="in-verifier-name" value="이명수" oninput="update()">
                    </div>
                </div>
            </section>

            <section class="space-y-3">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-tight">획정 요소</h3>
                <div>
                    <label class="text-[11px] font-semibold text-slate-600 mb-1 block">자격 (기산호봉)</label>
                    <select id="in-cert" onchange="update()">
                        <option value="9" data-text="정교사(1급)">정교사(1급) [9호봉]</option>
                        <option value="8" data-text="정교사(2급)" selected>정교사(2급) [8호봉]</option>
                        <option value="9" data-text="교장/교감/장학관">교장/교감/장학관 [9호봉]</option>
                        <option value="7" data-text="준교사">준교사 [7호봉]</option>
                    </select>
                </div>
                <div>
                    <label class="text-[11px] font-semibold text-slate-600 mb-1 block">학령 가감</label>
                    <select id="in-edu" onchange="update()">
                        <option value="0" data-text="대학교(4년제 졸업)" selected>대학교 (4년제) [0]</option>
                        <option value="1" data-text="대학교(5년제 졸업)">대학교 (5년제) [+1]</option>
                        <option value="2" data-text="대학교(6년제 졸업)">대학교 (6년제) [+2]</option>
                        <option value="-1" data-text="전문대(3년제 졸업)">전문대 (3년제) [-1]</option>
                        <option value="-2" data-text="전문대(2년제 졸업)">전문대 (2년제) [-2]</option>
                    </select>
                </div>
                <div class="flex items-center gap-2 p-3 bg-blue-50 rounded-lg border border-blue-100">
                    <input type="checkbox" id="in-plus" onchange="update()" checked class="w-4 h-4">
                    <label class="text-sm font-medium text-blue-900">사범계 가산(+1)</label>
                </div>
                <div>
                    <label class="text-[11px] font-semibold text-slate-600 mb-1 block">비고 (특이사항)</label>
                    <input type="text" id="in-note" placeholder="비고 입력" oninput="update()">
                </div>
            </section>

            <button onclick="window.print()" class="w-full bg-slate-800 hover:bg-black text-white font-bold py-3 rounded-xl transition-all shadow-lg flex items-center justify-center gap-2 mt-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                </svg>
                인쇄 및 PDF 저장
            </button>
        </div>
    </aside>

    <!-- Preview -->
    <main class="flex-1 p-8 overflow-y-auto bg-slate-100">
        <div class="paper">
            <h2 id="out-main-title" class="text-center text-2xl font-bold mb-2 tracking-[0.2em] underline underline-offset-[10px] decoration-1"></h2>

            <div class="text-center mb-6">
                <span class="text-sm font-bold text-slate-700">( <span id="out-header-office"></span> )</span>
            </div>

            <div class="flex justify-end items-end mb-2 px-1">
                <span class="text-[11px] font-medium">획정기준일: <span id="out-date" class="font-bold border-b-2 border-black px-1"></span></span>
            </div>

            <table class="info-table">
                <colgroup>
                    <col width="10%"><col width="15%"><col width="30%"><col width="15%"><col width="15%"><col width="15%">
                </colgroup>
                <tr>
                    <th rowspan="5" class="bg-slate-100">대<br>상<br>자</th>
                    <td class="label">소 속</td>
                    <td id="out-dept" class="text-left px-3 font-bold text-[14px]"></td>
                    <td class="label">획정 호봉</td>
                    <td colspan="2" id="out-final" class="highlight-blue bg-blue-50/50"></td>
                </tr>
                <tr>
                    <td class="label">성 명</td>
                    <td class="text-left px-3 font-bold text-[15px]">
                        <span id="out-name"></span>
                        <span class="float-right text-[10px] font-normal text-slate-500 mt-1">(인 또는 서명)</span>
                    </td>
                    <td class="label">기산 호봉</td>
                    <td colspan="2" id="out-cert-val" class="font-bold text-[13px]"></td>
                </tr>
                <tr>
                    <td class="label">자 격</td>
                    <td id="out-cert-text" class="text-left px-3 font-medium"></td>
                    <td class="label">학령가감</td>
                    <td colspan="2" id="out-edu-val" class="font-bold text-[13px]"></td>
                </tr>
                <tr>
                    <td class="label">학 령</td>
                    <td id="out-edu-text" class="text-left px-3 font-medium"></td>
                    <td class="label">사범가산</td>
                    <td colspan="2" id="out-plus-val" class="font-bold text-[13px]"></td>
                </tr>
                <tr>
                    <td class="label">비 고</td>
                    <td id="out-note" class="text-left px-3 text-[11px] text-slate-600"></td>
                    <td class="label">경력 년수</td>
                    <td colspan="2" id="out-career-sum" class="font-bold text-[14px]"></td>
                </tr>
                <tr class="border-t-2 border-black">
                    <th rowspan="2" class="bg-slate-100">확<br>인<br>자</th>
                    <td class="label">직 위</td>
                    <td id="out-verifier-rank" class="text-left px-3 font-bold text-[14px]"></td>
                    <td class="label">잔여 월/일</td>
                    <td colspan="2" id="out-rem" class="highlight-red bg-red-50/30"></td>
                </tr>
                <tr>
                    <td class="label">성 명</td>
                    <td class="text-left px-3">
                        <span id="out-verifier-name" class="font-bold text-[15px]"></span>
                        <span class="float-right text-[10px] text-slate-400 mt-1">(인)</span>
                    </td>
                    <td class="label">차기 승급일</td>
                    <td colspan="2" id="out-next-table" class="font-bold text-blue-700 text-[14px] tracking-tight"></td>
                </tr>
            </table>

            <div class="mt-8 mb-2 flex items-center justify-between">
                <div class="flex items-center gap-1.5">
                    <div class="w-1.5 h-4 bg-slate-800"></div>
                    <span class="text-[12px] font-bold">근무 경력 내역</span>
                </div>
                <button onclick="addCareer()" class="no-print text-[11px] bg-blue-50 text-blue-700 px-2 py-1 rounded border border-blue-200 font-bold hover:bg-blue-100">+ 경력 추가</button>
            </div>

            <table class="career-table">
                <colgroup>
                    <col width="15%"><col width="15%"><col width="20%">
                    <col width="5%"><col width="5%"><col width="5%">
                    <col width="5%"> 
                    <col width="5%"><col width="5%"><col width="5%">
                    <col width="10%" class="col-note">
                    <col width="5%" class="no-print col-delete">
                </colgroup>
                <thead>
                    <tr>
                        <th rowspan="2">시작일</th>
                        <th rowspan="2">종료일</th>
                        <th rowspan="2">기관 및 내용</th>
                        <th colspan="3">근무경력(실제)</th>
                        <th rowspan="2">환산<br>(%)</th>
                        <th colspan="3">환산경력(최종)</th>
                        <th rowspan="2">비고</th>
                        <th rowspan="2" class="no-print">삭제</th>
                    </tr>
                    <tr>
                        <th>년</th><th>월</th><th>일</th>
                        <th>년</th><th>월</th><th>일</th>
                    </tr>
                </thead>
                <tbody id="career-body"></tbody>
                <tfoot class="bg-slate-50 font-bold">
                    <tr>
                        <td colspan="7" class="text-right px-4 text-[10px]">환산 경력 합계</td>
                        <td id="total-y">0</td>
                        <td id="total-m">0</td>
                        <td id="total-d">0</td>
                        <td colspan="1" class="col-note"></td>
                        <td class="no-print col-delete"></td>
                    </tr>
                </tfoot>
            </table>

            <div class="mt-16 text-center">
                <p class="text-lg font-medium mb-12">위와 같이 <span id="out-doc-type" class="font-bold underline decoration-2 underline-offset-8"></span> 호봉을 획정함</p>
                <p id="footer-today" class="text-sm mb-12 text-slate-600"></p>
                <p id="out-footer-text" class="text-2xl font-bold tracking-[0.5em] mt-4"></p>
            </div>
        </div>
    </main>
</div>

<script>
    let careers = [
        { s: '2020-03-01', e: '2022-02-28', n: '정교사 경력', r: '100', note: '공립학교' },
        { s: '2022-03-01', e: '2024-02-29', n: '임용 전 계약제교원', r: '100', note: '기간제' }
    ];

    function init() {
        const today = new Date();
        document.getElementById('in-date').value = today.toISOString().split('T')[0];
        document.getElementById('footer-today').innerText = today.getFullYear() + '년 ' + (today.getMonth() + 1) + '월 ' + today.getDate() + '일';
        renderCareers();
        update();
    }

    function addCareer() {
        careers.push({ s:'', e:'', n:'', r:'100', note:'' });
        renderCareers();
        update();
    }

    function removeCareer(i) {
        if(careers.length <= 1) return;
        careers.splice(i, 1);
        renderCareers();
        update();
    }

    function edit(i, f, v) {
        careers[i][f] = v;
        update();
    }

    function renderCareers() {
        const body = document.getElementById('career-body');
        body.innerHTML = '';
        careers.forEach((c, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="p-0"><input type="date" class="career-row-input" value="${c.s}" onchange="edit(${i},'s',this.value)"></td>
                <td class="p-0"><input type="date" class="career-row-input" value="${c.e}" onchange="edit(${i},'e',this.value)"></td>
                <td class="p-0"><input type="text" class="career-row-input px-1 text-left" style="font-size:10px;" value="${c.n}" oninput="edit(${i},'n',this.value)"></td>
                <td id="raw-y-${i}" class="bg-gray-50/50">0</td>
                <td id="raw-m-${i}" class="bg-gray-50/50">0</td>
                <td id="raw-d-${i}" class="bg-gray-50/50">0</td>
                <td class="p-0"><input type="text" class="career-row-input font-bold" style="font-size:10px;" value="${c.r}" oninput="edit(${i},'r',this.value)"></td>
                <td id="row-y-${i}" class="font-bold">0</td>
                <td id="row-m-${i}" class="font-bold">0</td>
                <td id="row-d-${i}" class="font-bold">0</td>
                <td class="p-0 col-note"><input type="text" class="career-row-input px-1 text-left" style="font-size:10px;" value="${c.note || ''}" oninput="edit(${i},'note',this.value)"></td>
                <td class="no-print p-0 col-delete"><button onclick="removeCareer(${i})" class="w-full h-full text-red-400 hover:text-red-600">✕</button></td>
            `;
            body.appendChild(tr);
        });
    }

    /**
     * 공무원 경력 획정 날짜 계산 로직 (연, 월, 일 단위 정밀 계산)
     */
    function calcV38(sStr, eStr) {
        if(!sStr || !eStr) return {y:0, m:0, d:0};
        let start = new Date(sStr);
        let end = new Date(eStr);
        if(start > end) return {y:0, m:0, d:0};
        
        let target = new Date(end.getTime());
        target.setDate(target.getDate() + 1);
        
        let curr = new Date(start);
        let yy = 0, mm = 0, dd = 0;
        
        while(true) {
            let nextYear = new Date(curr);
            nextYear.setFullYear(curr.getFullYear() + 1);
            if(nextYear <= target) {
                curr = nextYear;
                yy++;
            } else break;
        }
        
        while(true) {
            let nextMonth = new Date(curr);
            nextMonth.setMonth(curr.getMonth() + 1);
            if(nextMonth <= target) {
                curr = nextMonth;
                mm++;
            } else break;
        }
        
        dd = Math.round((target.getTime() - curr.getTime()) / (1000 * 60 * 60 * 24));
        
        return {y:yy, m:mm, d:dd};
    }

    function update() {
        const deptValue = document.getElementById('in-dept').value;
        const officeName = document.getElementById('in-office-text').value;
        document.getElementById('out-header-office').innerText = officeName;
        document.getElementById('out-dept').innerText = deptValue;
        document.getElementById('out-footer-text').innerText = deptValue;
        
        const docName = document.getElementById('in-header-text').value.trim();
        document.getElementById('out-main-title').innerText = docName ? docName + " 호봉획정표" : "호봉획정표";
        document.getElementById('out-doc-type').innerText = docName || "교육공무원";
        document.getElementById('out-name').innerText = document.getElementById('in-name').value;
        document.getElementById('out-note').innerText = document.getElementById('in-note').value;
        
        // 확인자 업데이트
        document.getElementById('out-verifier-rank').innerText = document.getElementById('in-verifier-rank').value;
        document.getElementById('out-verifier-name').innerText = document.getElementById('in-verifier-name').value;

        const bDate = document.getElementById('in-date').value;
        document.getElementById('out-date').innerText = bDate;
        
        const certS = document.getElementById('in-cert');
        const cStep = parseInt(certS.value);
        document.getElementById('out-cert-text').innerText = certS.options[certS.selectedIndex].getAttribute('data-text');
        document.getElementById('out-cert-val').innerText = cStep + " 호봉";
        
        const eduS = document.getElementById('in-edu');
        const eAdj = parseInt(eduS.value);
        document.getElementById('out-edu-text').innerText = eduS.options[eduS.selectedIndex].getAttribute('data-text');
        document.getElementById('out-edu-val').innerText = (eAdj >= 0 ? "+" : "") + eAdj;
        
        const plus = document.getElementById('in-plus').checked ? 1 : 0;
        document.getElementById('out-plus-val').innerText = (plus >= 0 ? "+" : "") + plus;

        let totalY = 0, totalM = 0, totalD = 0;
        
        careers.forEach((c, i) => {
            const raw = calcV38(c.s, c.e);
            document.getElementById(`raw-y-${i}`).innerText = raw.y;
            document.getElementById(`raw-m-${i}`).innerText = raw.m;
            document.getElementById(`raw-d-${i}`).innerText = raw.d;

            const rate = (parseFloat(c.r) || 0) / 100;
            
            let rawTotalDays = (raw.y * 360) + (raw.m * 30) + raw.d;
            let convTotalDays = Math.floor(rawTotalDays * rate);
            
            let y = Math.floor(convTotalDays / 360);
            let m = Math.floor((convTotalDays % 360) / 30);
            let d = convTotalDays % 30;

            document.getElementById(`row-y-${i}`).innerText = y;
            document.getElementById(`row-m-${i}`).innerText = m;
            document.getElementById(`row-d-${i}`).innerText = d;
            
            totalY += y;
            totalM += m;
            totalD += d;
        });

        totalM += Math.floor(totalD / 30);
        totalD = totalD % 30;
        totalY += Math.floor(totalM / 12);
        totalM = totalM % 12;

        document.getElementById('total-y').innerText = totalY;
        document.getElementById('total-m').innerText = totalM;
        document.getElementById('total-d').innerText = totalD;
        
        document.getElementById('out-career-sum').innerText = totalY + "년 " + totalM + "월 " + totalD + "일";
        document.getElementById('out-rem').innerText = totalM + "월 " + totalD + "일";

        const finalStep = cStep + eAdj + plus + totalY;
        const displayStep = finalStep > 40 ? 40 : finalStep;
        document.getElementById('out-final').innerText = displayStep + " 호봉";

        if(bDate) {
            let next = new Date(bDate);
            let monthsToNext = 12 - totalM;
            next.setMonth(next.getMonth() + monthsToNext);
            next.setDate(1); 
            const formattedNext = next.getFullYear() + "년 " + String(next.getMonth() + 1).padStart(2,'0') + "월 01일";
            document.getElementById('out-next-table').innerText = formattedNext;
        }
    }

    window.onload = init;
</script>
</body>
</html>
