<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교육공무원 호봉획정 프로그램</title>
    <!-- 외부 의존성을 줄이기 위해 핵심 스타일을 내부에 포함 -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        /* 메인 컨테이너 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
        }

        /* 입력창 스타일 */
        .sidebar {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            height: fit-content;
        }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #555; }
        .input-group input, .input-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }

        /* 프리뷰(A4) 영역 */
        .preview-card {
            background: white;
            padding: 15mm;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            min-height: 297mm;
            box-sizing: border-box;
        }

        /* 표 스타일 */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            table-layout: fixed;
        }
        th, td {
            border: 1px solid #000;
            padding: 8px 4px;
            text-align: center;
            font-size: 12px;
            overflow: hidden;
        }
        .bg-light { background-color: #f9f9f9; }
        
        .btn-print {
            width: 100%;
            padding: 15px;
            background: #0056b3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-print:hover { background: #004494; }

        .career-input {
            border: none;
            width: 100%;
            text-align: center;
            font-size: 11px;
            background: transparent;
        }

        /* 인쇄 시 설정 */
        @media print {
            body { background: white; padding: 0; }
            .sidebar, .no-print { display: none !important; }
            .container { display: block; }
            .preview-card { 
                box-shadow: none; 
                margin: 0; 
                width: 100%; 
                padding: 10mm;
            }
            .career-input { border: none; }
            @page { size: A4; margin: 0; }
        }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
            .preview-card { padding: 5mm; min-height: auto; width: 100%; overflow-x: auto; }
        }

        .doc-title {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            text-decoration: underline;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 입력 사이드바 -->
    <div class="sidebar no-print">
        <h2 style="margin-top:0">설정</h2>
        <div class="input-group">
            <label>기관명</label>
            <input type="text" id="in-dept" value="강원특별자치도교육청" oninput="update()">
        </div>
        <div class="input-group">
            <label>성명</label>
            <input type="text" id="in-name" value="홍길동" oninput="update()">
        </div>
        <div class="input-group">
            <label>기산호봉 (자격)</label>
            <select id="in-cert" onchange="update()">
                <option value="9">1급 정교사 (9호봉)</option>
                <option value="8">2급 정교사 (8호봉)</option>
            </select>
        </div>
        <div class="input-group">
            <label>학령 가감</label>
            <input type="number" id="in-edu" value="0" oninput="update()">
        </div>
        <div class="input-group" style="display:flex; align-items:center;">
            <input type="checkbox" id="in-plus" onchange="update()" checked style="width:auto; margin-right:8px;">
            <label style="margin:0">사범계 가산(+1)</label>
        </div>
        <div class="input-group">
            <label>획정 기준일</label>
            <input type="date" id="in-date" onchange="update()">
        </div>

        <button class="btn-print" onclick="window.print()">PDF 저장 / 인쇄</button>
        <p style="font-size:11px; color:#666; margin-top:10px; line-height:1.4;">
            ※ 인쇄 창이 뜨면 '대상'을 <b>[PDF로 저장]</b>으로 선택하세요. 레이아웃이 깨지지 않습니다.
        </p>
    </div>

    <!-- 출력 문서 영역 -->
    <div class="preview-card" id="document">
        <div class="doc-title">교 육 공 무 원 호 봉 획 정 표</div>
        
        <div style="display:flex; justify-content:space-between; margin-bottom:5px; font-size:13px;">
            <span>( <span id="out-dept-sub">강원특별자치도교육청</span> )</span>
            <span>획정기준일: <b id="out-date"></b></span>
        </div>

        <table>
            <colgroup>
                <col style="width:15%">
                <col style="width:35%">
                <col style="width:15%">
                <col style="width:35%">
            </colgroup>
            <tr>
                <td class="bg-light">성명</td>
                <td><b id="out-name"></b> (인)</td>
                <td class="bg-light">최종 호봉</td>
                <td><b id="out-final" style="font-size:16px; color:#0056b3;">-</b></td>
            </tr>
            <tr>
                <td class="bg-light">기산호봉</td>
                <td id="out-cert">-</td>
                <td class="bg-light">학령가감</td>
                <td id="out-edu">-</td>
            </tr>
            <tr>
                <td class="bg-light">사범가산</td>
                <td id="out-plus">-</td>
                <td class="bg-light">경력환산</td>
                <td id="out-career">-</td>
            </tr>
        </table>

        <div style="font-weight:bold; margin-bottom:8px; font-size:14px;">■ 경력 환산 내역</div>
        <table id="career-table">
            <colgroup>
                <col style="width:25%">
                <col style="width:25%">
                <col style="width:30%">
                <col style="width:20%">
            </colgroup>
            <thead class="bg-light">
                <tr>
                    <th>시작일</th>
                    <th>종료일</th>
                    <th>기관 및 내용</th>
                    <th>환산경력</th>
                </tr>
            </thead>
            <tbody id="career-body">
                <!-- JS에서 생성 -->
            </tbody>
            <tfoot class="bg-light" style="font-weight:bold;">
                <tr>
                    <td colspan="3">환산 경력 총계</td>
                    <td id="total-career">0년 0월 0일</td>
                </tr>
            </tfoot>
        </table>

        <div style="margin-top:20px; display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
            <div style="border:1px solid #000; padding:10px; text-align:center;">
                <div style="font-size:11px; color:#666;">잔여 월/일</div>
                <div id="out-rem" style="font-size:18px; font-weight:bold;">0월 0일</div>
            </div>
            <div style="border:1px solid #0056b3; padding:10px; text-align:center;">
                <div style="font-size:11px; color:#0056b3;">다음 승급 예정일</div>
                <div id="out-next" style="font-size:18px; font-weight:bold; color:#0056b3;">-</div>
            </div>
        </div>

        <div style="margin-top:80px; text-align:center;">
            <p>위와 같이 호봉을 획정함</p>
            <p id="today-date" style="margin-top:20px;"></p>
            <p id="out-dept-footer" style="margin-top:40px; font-size:18px; font-weight:bold;"></p>
        </div>
    </div>
</div>

<script>
    // 초기 경력 데이터
    let careers = [{ s: '2020-03-01', e: '2021-02-28', n: 'OO초등학교 기간제교사', r: 100 }];

    function init() {
        document.getElementById('in-date').value = new Date().toISOString().split('T')[0];
        document.getElementById('today-date').innerText = new Date().toLocaleDateString('ko-KR', {year:'numeric', month:'long', day:'numeric'});
        renderCareers();
        update();
    }

    function renderCareers() {
        const body = document.getElementById('career-body');
        body.innerHTML = '';
        careers.forEach((c, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="date" class="career-input" value="${c.s}" onchange="edit(${i},'s',this.value)"></td>
                <td><input type="date" class="career-input" value="${c.e}" onchange="edit(${i},'e',this.value)"></td>
                <td><input type="text" class="career-input" value="${c.n}" oninput="edit(${i},'n',this.value)"></td>
                <td id="res-${i}">0년 0월 0일</td>
            `;
            body.appendChild(tr);
        });
        
        // 추가 버튼 (인쇄 제외)
        const addRow = document.createElement('tr');
        addRow.className = 'no-print';
        addRow.innerHTML = `<td colspan="4" style="cursor:pointer; color:#0056b3; padding:10px;" onclick="add()">+ 경력 추가</td>`;
        body.appendChild(addRow);
    }

    function add() { careers.push({ s:'', e:'', n:'', r:100 }); renderCareers(); update(); }
    function edit(i, f, v) { careers[i][f] = v; update(); }

    function update() {
        const dept = document.getElementById('in-dept').value;
        const name = document.getElementById('in-name').value;
        const cert = parseInt(document.getElementById('in-cert').value);
        const edu = parseInt(document.getElementById('in-edu').value);
        const plus = document.getElementById('in-plus').checked ? 1 : 0;
        const baseDate = document.getElementById('in-date').value;

        document.getElementById('out-dept-sub').innerText = dept || '기관명 미입력';
        document.getElementById('out-dept-footer').innerText = dept || '기관명 미입력';
        document.getElementById('out-name').innerText = name || '성명';
        document.getElementById('out-date').innerText = baseDate;
        document.getElementById('out-cert').innerText = cert + " 호봉";
        document.getElementById('out-edu').innerText = (edu >= 0 ? "+" : "") + edu;
        document.getElementById('out-plus').innerText = "+" + plus;

        let tY = 0, tM = 0, tD = 0;

        careers.forEach((c, i) => {
            if(c.s && c.e) {
                const start = new Date(c.s);
                const end = new Date(c.e);
                let diff = Math.floor((end - start) / (1000*60*60*24)) + 1;
                
                if(diff > 0) {
                    let y = Math.floor(diff / 365);
                    let m = Math.floor((diff % 365) / 30);
                    let d = (diff % 365) % 30;
                    document.getElementById(`res-${i}`).innerText = `${y}년 ${m}월 ${d}일`;
                    tY += y; tM += m; tD += d;
                }
            }
        });

        tM += Math.floor(tD / 30); tD %= 30;
        tY += Math.floor(tM / 12); tM %= 12;

        document.getElementById('total-career').innerText = `${tY}년 ${tM}월 ${tD}일`;
        document.getElementById('out-career').innerText = `${tY}년`;
        document.getElementById('out-final').innerText = (cert + edu + plus + tY) + " 호봉";
        document.getElementById('out-rem').innerText = `${tM}월 ${tD}일`;

        if(baseDate) {
            const next = new Date(baseDate);
            next.setMonth(next.getMonth() + (12 - tM));
            next.setDate(1);
            document.getElementById('out-next').innerText = next.toISOString().split('T')[0];
        }
    }

    window.onload = init;
</script>

</body>
</html>
